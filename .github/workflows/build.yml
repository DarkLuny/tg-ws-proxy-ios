name: Build iOS App

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: 'stable'

    - name: Build for iOS device
      run: |
        mkdir -p build/ios
        CGO_ENABLED=1 GOOS=ios GOARCH=arm64 \
          CC=$(xcrun --sdk iphoneos -f clang) \
          CFLAGS="-isysroot $(xcrun --sdk iphoneos --show-sdk-path) -arch arm64 -mios-version-min=16.0" \
          go build -v -buildmode=c-archive -o build/ios/libtgwsproxy.a .

    - name: Build for iOS Simulator
      run: |
        mkdir -p build/sim
        CGO_ENABLED=1 GOOS=ios GOARCH=arm64 \
          CC=$(xcrun --sdk iphonesimulator -f clang) \
          CFLAGS="-isysroot $(xcrun --sdk iphonesimulator --show-sdk-path) -arch arm64 -mios-simulator-version-min=16.0" \
          go build -v -buildmode=c-archive -o build/sim/libtgwsproxy.a .

    - name: Create XCFramework
      run: |
        xcodebuild -create-xcframework \
          -library build/ios/libtgwsproxy.a -headers include \
          -library build/sim/libtgwsproxy.a -headers include \
          -output build/TgWsProxy.xcframework

    - name: Package XCFramework
      run: |
        cd build
        zip -r ../TgWsProxy-XCFramework.zip TgWsProxy.xcframework

    - name: Upload XCFramework
      uses: actions/upload-artifact@v4
      with:
        name: TgWsProxy-XCFramework
        path: TgWsProxy-XCFramework.zip
